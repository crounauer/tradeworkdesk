name: Weekly Database Backup

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.dump"
          echo "FILENAME=${FILENAME}" >> "$GITHUB_ENV"

          pg_dump \
            --dbname="$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="${FILENAME}"

          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "Backup complete: ${FILENAME} (${SIZE})"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp "${{ env.FILENAME }}" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/${{ env.FILENAME }}" \
            --endpoint-url "$R2_ENDPOINT"

          echo "Uploaded to R2: ${{ env.FILENAME }}"

      - name: Prune old backups (keep last 12 weeks)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # List files sorted oldest-first, delete any beyond the 12 most recent
          FILES=$(aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/" \
            --endpoint-url "$R2_ENDPOINT" \
            | sort \
            | awk '{print $4}' \
            | grep '\.dump$')

          TOTAL=$(echo "$FILES" | grep -c '.' || true)
          DELETE_COUNT=$(( TOTAL > 12 ? TOTAL - 12 : 0 ))

          if [ "$DELETE_COUNT" -gt 0 ]; then
            echo "Deleting ${DELETE_COUNT} old backup(s)..."
            echo "$FILES" | head -n "$DELETE_COUNT" | while read -r file; do
              echo "  Deleting: ${file}"
              aws s3 rm "s3://${{ secrets.R2_BUCKET_NAME }}/${file}" \
                --endpoint-url "$R2_ENDPOINT"
            done
          else
            echo "No old backups to prune (${TOTAL}/12 slots used)"
          fi

      - name: Report success
        run: |
          echo "✓ Backup complete: ${{ env.FILENAME }}"
