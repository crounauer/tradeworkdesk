name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run backup via Railway API
        run: |
          BASE_URL=$(echo "${{ secrets.PLATFORM_API_URL }}" | tr -d '[:space:]')
          echo "Triggering backup on Railway (Railway has IPv6 connectivity to Supabase)..."
          RESULT=$(curl -sf --max-time 300 -X POST \
            -H "x-cron-secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            "${BASE_URL}/api/internal/run-backup")
          echo "Result: $RESULT"
          # Fail the job if status != success
          STATUS=$(echo "$RESULT" | jq -r '.status // "error"')
          if [ "$STATUS" != "success" ]; then
            echo "Backup failed: $RESULT"
            exit 1
          fi
          FILENAME=$(echo "$RESULT" | jq -r '.filename')
          SIZE=$(echo "$RESULT" | jq -r '.sizeBytes')
          echo "Backup complete: ${FILENAME} (${SIZE} bytes)"
