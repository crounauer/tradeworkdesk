name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Fetch backup credentials from platform admin
        run: |
          BASE_URL=$(echo "${{ secrets.PLATFORM_API_URL }}" | tr -d '[:space:]')
          CREDS=$(curl -sf \
            -H "x-cron-secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            "${BASE_URL}/api/internal/backup-config")

          echo "SUPABASE_DB_URL=$(echo "$CREDS"      | jq -r .backup_supabase_db_url)"      >> "$GITHUB_ENV"
          echo "R2_ACCOUNT_ID=$(echo "$CREDS"        | jq -r .backup_r2_account_id)"        >> "$GITHUB_ENV"
          echo "R2_ACCESS_KEY_ID=$(echo "$CREDS"     | jq -r .backup_r2_access_key_id)"     >> "$GITHUB_ENV"
          echo "R2_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .backup_r2_secret_access_key)" >> "$GITHUB_ENV"
          echo "R2_BUCKET_NAME=$(echo "$CREDS"       | jq -r .backup_r2_bucket_name)"       >> "$GITHUB_ENV"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.dump"
          echo "FILENAME=${FILENAME}" >> "$GITHUB_ENV"

          pg_dump \
            --dbname="$SUPABASE_DB_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="${FILENAME}"

          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "Backup complete: ${FILENAME} (${SIZE})"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "${{ env.FILENAME }}" \
            "s3://${{ env.R2_BUCKET_NAME }}/${{ env.FILENAME }}" \
            --endpoint-url "https://${{ env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          echo "Uploaded to R2: ${{ env.FILENAME }}"

      - name: Prune old backups (keep last 30 days)
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          FILES=$(aws s3 ls "s3://${{ env.R2_BUCKET_NAME }}/" \
            --endpoint-url "https://${{ env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            | sort \
            | awk '{print $4}' \
            | grep '\.dump$')

          TOTAL=$(echo "$FILES" | grep -c '.' || true)
          DELETE_COUNT=$(( TOTAL > 30 ? TOTAL - 30 : 0 ))

          if [ "$DELETE_COUNT" -gt 0 ]; then
            echo "Deleting ${DELETE_COUNT} old backup(s)..."
            echo "$FILES" | head -n "$DELETE_COUNT" | while read -r file; do
              echo "  Deleting: ${file}"
              aws s3 rm "s3://${{ env.R2_BUCKET_NAME }}/${file}" \
                --endpoint-url "https://${{ env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
            done
          else
            echo "No old backups to prune (${TOTAL}/30 slots used)"
          fi

      - name: Report success
        run: |
          echo "Backup complete: ${{ env.FILENAME }}"
