name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger backup on Railway API
        run: |
          BASE_URL=$(echo "${{ secrets.PLATFORM_API_URL }}" | tr -d '[:space:]')
          RESPONSE=$(curl -sf --max-time 300 \
            -X POST \
            -H "x-cron-secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${BASE_URL}/api/internal/run-backup")
          echo "Backup response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
          if [ "$STATUS" != "success" ]; then
            echo "Backup failed: $RESPONSE"
            exit 1
          fi
          FILENAME=$(echo "$RESPONSE" | jq -r '.filename')
          SIZE_BYTES=$(echo "$RESPONSE" | jq -r '.sizeBytes')
          PRUNED=$(echo "$RESPONSE" | jq -r '.pruned')
          echo "Backup complete: $FILENAME ($SIZE_BYTES bytes), pruned $PRUNED old file(s)"
