[build]
builder = "dockerfile"
dockerfilePath = "artifacts/api-server/Dockerfile"
watchPatterns = ["artifacts/api-server/**", "lib/**", "scripts/**", "package.json", "pnpm-workspace.yaml", "pnpm-lock.yaml", "tsconfig.base.json"]
# updated 2026-05-20

[deploy]
startCommand = "pnpm --filter @workspace/api-server start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 30

[env]
NODE_ENV = "production"
FLY_RENDERER_APP_NAME = "tradeworkdesk-renderer"
PLATFORM_CNAME_TARGET = "sites.tradeworkdesk.co.uk"
FLY_PUBLIC_IPV4 = "66.241.125.253"
FLY_PUBLIC_IPV6 = "2a09:8280:1::139:7e95:0"
PUBLIC_SITE_API_CACHE_MAX_AGE_SECONDS = "30"
PUBLIC_SITE_API_CACHE_SWR_SECONDS = "120"
CANONICAL_DOMAIN_CACHE_MAX_AGE_SECONDS = "60"
CANONICAL_DOMAIN_CACHE_SWR_SECONDS = "300"
