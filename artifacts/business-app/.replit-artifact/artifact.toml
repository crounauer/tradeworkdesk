kind = "web"
previewPath = "/"
title = "Boiler Service App"
version = "1.0.0"
id = "artifacts/boiler-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22873
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/boiler-app run dev"

[services.env]
PORT = "22873"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/boiler-app", "run", "build"]

[services.production.run]
args = ["node", "artifacts/boiler-app/serve.js"]

[services.production.run.env]
PORT = "22873"

[services.production.health.startup]
path = "/"
