# Fly.io config for tradeworkdesk website renderer
# Deploy from monorepo root: fly deploy -c artifacts/website-renderer/fly.toml

app = "tradeworkdesk-renderer"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  HOSTNAME = "0.0.0.0"
  API_BASE_URL = "https://tradeworkdesk-api.fly.dev"
  PUBLIC_SITE_CACHE_TTL_SECONDS = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 4

  [http_service.concurrency]
    type = "requests"
    soft_limit = 60
    hard_limit = 90

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1