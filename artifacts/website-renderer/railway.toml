[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/website-renderer build"
watchPatterns = ["artifacts/website-renderer/**", "package.json", "pnpm-workspace.yaml", "pnpm-lock.yaml"]

[deploy]
startCommand = "pnpm --filter @workspace/website-renderer start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
NODE_ENV = "production"
