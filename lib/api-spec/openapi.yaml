openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Boiler Service Technician API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: customers
    description: Customer management
  - name: properties
    description: Property management
  - name: appliances
    description: Appliance management
  - name: jobs
    description: Job management
  - name: serviceRecords
    description: Service record management
  - name: commissioningRecords
    description: Commissioning record management
  - name: breakdownReports
    description: Breakdown report management
  - name: oilTankInspections
    description: Oil tank installation/inspection management
  - name: oilTankRiskAssessments
    description: Oil tank risk assessment management
  - name: combustionAnalysis
    description: Combustion analysis record management
  - name: burnerSetup
    description: Burner setup record management
  - name: fireValveTests
    description: Fire valve test record management
  - name: oilLineVacuumTests
    description: Oil line vacuum test record management
  - name: jobCompletionReports
    description: Job completion report management
  - name: notes
    description: Job notes
  - name: files
    description: File attachments
  - name: signatures
    description: Signature management
  - name: search
    description: Global search
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

