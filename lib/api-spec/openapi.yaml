openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Boiler Service Technician API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: customers
    description: Customer management
  - name: properties
    description: Property management
  - name: appliances
    description: Appliance management
  - name: jobs
    description: Job management
  - name: serviceRecords
    description: Service record management
  - name: breakdownReports
    description: Breakdown report management
  - name: notes
    description: Job notes
  - name: files
    description: File attachments
  - name: signatures
    description: Signature management
  - name: search
    description: Global search
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /auth/profiles:
    get:
      operationId: listProfiles
      tags: [auth]
      summary: List all user profiles (technicians)
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Soft-delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List properties
      parameters:
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Property list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get property by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Property details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyDetail"
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Soft-delete property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /appliances:
    get:
      operationId: listAppliances
      tags: [appliances]
      summary: List appliances
      parameters:
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Appliance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appliance"
    post:
      operationId: createAppliance
      tags: [appliances]
      summary: Create an appliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplianceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appliance"

  /appliances/{id}:
    get:
      operationId: getAppliance
      tags: [appliances]
      summary: Get appliance by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Appliance details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplianceDetail"
    patch:
      operationId: updateAppliance
      tags: [appliances]
      summary: Update appliance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplianceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appliance"
    delete:
      operationId: deleteAppliance
      tags: [appliances]
      summary: Soft-delete appliance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: job_type
          in: query
          schema:
            type: string
        - name: technician_id
          in: query
          schema:
            type: string
            format: uuid
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobListItem"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Soft-delete job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /service-records:
    post:
      operationId: createServiceRecord
      tags: [serviceRecords]
      summary: Create a service record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRecordBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"

  /service-records/{id}:
    get:
      operationId: getServiceRecord
      tags: [serviceRecords]
      summary: Get service record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Service record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"
    patch:
      operationId: updateServiceRecord
      tags: [serviceRecords]
      summary: Update service record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRecordBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"

  /service-records/job/{jobId}:
    get:
      operationId: getServiceRecordByJob
      tags: [serviceRecords]
      summary: Get service record by job ID
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Service record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"

  /breakdown-reports:
    post:
      operationId: createBreakdownReport
      tags: [breakdownReports]
      summary: Create a breakdown report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBreakdownReportBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakdownReport"

  /breakdown-reports/{id}:
    get:
      operationId: getBreakdownReport
      tags: [breakdownReports]
      summary: Get breakdown report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Breakdown report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakdownReport"
    patch:
      operationId: updateBreakdownReport
      tags: [breakdownReports]
      summary: Update breakdown report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBreakdownReportBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakdownReport"

  /breakdown-reports/job/{jobId}:
    get:
      operationId: getBreakdownReportByJob
      tags: [breakdownReports]
      summary: Get breakdown report by job ID
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Breakdown report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakdownReport"

  /jobs/{jobId}/notes:
    get:
      operationId: listJobNotes
      tags: [notes]
      summary: List notes for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobNote"
    post:
      operationId: createJobNote
      tags: [notes]
      summary: Create a job note
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobNoteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobNote"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List file attachments
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
        - name: entity_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileAttachment"

  /files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - entity_type
                - entity_id
              properties:
                file:
                  type: string
                  format: binary
                entity_type:
                  type: string
                entity_id:
                  type: string
                  format: uuid
                description:
                  type: string
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileAttachment"

  /files/{id}:
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /files/{id}/url:
    get:
      operationId: getFileUrl
      tags: [files]
      summary: Get signed download URL for file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUrl"

  /signatures:
    post:
      operationId: createSignature
      tags: [signatures]
      summary: Upload a signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSignatureBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signature"

  /signatures/job/{jobId}:
    get:
      operationId: getJobSignatures
      tags: [signatures]
      summary: Get signatures for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Signatures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signature"

  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /reports/upcoming-services:
    get:
      operationId: getUpcomingServices
      tags: [reports]
      summary: Get upcoming service due dates
      responses:
        "200":
          description: Upcoming services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingService"

  /reports/overdue-services:
    get:
      operationId: getOverdueServices
      tags: [reports]
      summary: Get overdue services
      responses:
        "200":
          description: Overdue services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingService"

  /reports/completed-by-technician:
    get:
      operationId: getCompletedByTechnician
      tags: [reports]
      summary: Get completed jobs grouped by technician
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Completed jobs by technician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechnicianStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      required: [id, email, full_name, role, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [admin, office_staff, technician]
        phone:
          type: ["string", "null"]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateProfileBody:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: ["string", "null"]

    Customer:
      type: object
      required: [id, first_name, last_name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: ["string", "null"]
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]
        address_line1:
          type: ["string", "null"]
        address_line2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        county:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/Customer"
        - type: object
          properties:
            properties:
              type: array
              items:
                $ref: "#/components/schemas/Property"

    CreateCustomerBody:
      type: object
      required: [first_name, last_name]
      properties:
        title:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        mobile:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        county:
          type: string
        postcode:
          type: string
        notes:
          type: string

    UpdateCustomerBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]
        address_line1:
          type: ["string", "null"]
        address_line2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        county:
          type: ["string", "null"]
        postcode:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        is_active:
          type: boolean

    Property:
      type: object
      required: [id, customer_id, address_line1, postcode, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        address_line1:
          type: string
        address_line2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        county:
          type: ["string", "null"]
        postcode:
          type: string
        property_type:
          type: ["string", "null"]
        occupancy_type:
          type: ["string", "null"]
        access_notes:
          type: ["string", "null"]
        boiler_location:
          type: ["string", "null"]
        flue_location:
          type: ["string", "null"]
        tank_location:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        customer_name:
          type: ["string", "null"]

    PropertyDetail:
      allOf:
        - $ref: "#/components/schemas/Property"
        - type: object
          properties:
            customer:
              $ref: "#/components/schemas/Customer"
            appliances:
              type: array
              items:
                $ref: "#/components/schemas/Appliance"
            recent_jobs:
              type: array
              items:
                $ref: "#/components/schemas/JobListItem"

    CreatePropertyBody:
      type: object
      required: [customer_id, address_line1, postcode]
      properties:
        customer_id:
          type: string
          format: uuid
        address_line1:
